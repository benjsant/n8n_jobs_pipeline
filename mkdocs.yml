site_name: Job Hunter
site_description: Assistant de recherche d'emploi semi-automatique (collecte, scoring, CV + lettre par IA, garde-fous anti-invention).
site_author: Benjamin Santrisse
repo_url: https://github.com/benjsant/n8n_jobs_pipeline
repo_name: benjsant/n8n_jobs_pipeline
docs_dir: docs
site_dir: site

# Docs internes (mémoire de dev, suivi, specs) exclues du site public.
exclude_docs: |
  contexte-claude.md
  reste-a-faire.md
  idees-inspiration.md
  specs/

theme:
  name: material
  language: fr
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Mode clair
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Accueil: index.md
  - Démarrage:
      - Installation: installation.md
      - Mini-interface (URL → CV + lettre): interface.md
      - Clés & sources d'offres: cles-sources.md
      - Historique Airtable: airtable.md
  - Déploiement:
      - VPS privé (WireGuard + SSH): deploiement-vps.md
      - OAuth Google (Gmail + Drive): oauth-google.md
  - Référence:
      - API & schéma SQL: reference.md
      - Données & DeepSeek: donnees-et-deepseek.md
  - Projet:
      - Choix technologiques: choix-techniques.md
      - Guide technique (mainteneur): architecture-technique.md
      - Évolution LangGraph: plan-langgraph.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html          # requis pour les "grid cards" (<div markdown>)
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.emoji:      # rend les icônes :material-...:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: fr

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/benjsant
