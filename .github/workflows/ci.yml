name: CI

on:
  push:
    branches: [main]
  pull_request:

# Tests vérifiables hors stack : aucune clé, aucun service, aucun Docker.
jobs:
  js:
    name: JS (logique offres, sources, scoring, rendu, parité nœuds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Parité nœuds n8n ↔ offer-utils (garde-fou anti-divergence)
        run: node workflows/lib/build-nodes.mjs --check
      - name: Suites de tests JS
        run: |
          for f in workflows/lib/*.test.mjs cv/*.test.mjs cv/scripts/*.test.mjs; do
            echo "── $f"
            node "$f" || exit 1
          done

  python:
    name: Python (agent LangGraph + schéma §6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dépendances de l'agent
        run: pip install --quiet "langgraph>=0.2,<0.3" "langchain-openai>=0.2,<0.4" "pydantic>=2,<3" "httpx>=0.27,<1" pytest
      - name: Tests de l'agent (LLM + web/registre mockés)
        run: cd services/agent-langgraph && python -m pytest -q
      - name: Schéma de sortie de l'agent (mock, sans clé)
        run: python scripts/test_deepseek.py --mock
