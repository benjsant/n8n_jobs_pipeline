services:
  postgres:
    # Image pgvector (= postgres:16 + extension vector) requise par la dédup
    # sémantique (db/schema.sql : CREATE EXTENSION vector). Même PG 16 que l'alpine
    # d'origine -> volume de données compatible.
    image: pgvector/pgvector:pg16
    container_name: job-hunter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init appliqué au PREMIER démarrage (base vide uniquement), par ordre
      # alphabétique. On monte UNIQUEMENT les fichiers d'init (pas queries.sql,
      # qui est une référence, ni queries.test.sh). Si la base existe déjà,
      # appliquer db/schema.sql à la main.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed-profiles.sql:/docker-entrypoint-initdb.d/02-seed-profiles.sql:ro
      # Crée la base applicative de Metabase (profil opt-in). Idempotent.
      - ./db/init-metabase.sh:/docker-entrypoint-initdb.d/03-init-metabase.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: job-hunter-n8n
    restart: unless-stopped
    ports:
      # Publié sur 127.0.0.1 par défaut (local only). BIND_HOST=0.0.0.0 pour
      # rouvrir (ou l'IP WireGuard sur VPS). Port INTERNE n8n = 5678.
      - "${BIND_HOST:-127.0.0.1}:${N8N_PORT:-8978}:5678"
    environment:
      # --- Base de données ---
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      # --- Sécurité / accès ---
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      # Fuseau des crons : sans lui n8n retombe sur America/New_York (le « 8h »
      # du workflow 01 partait en réalité à 14h heure de Paris).
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Paris}
      TZ: ${GENERIC_TIMEZONE:-Europe/Paris}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:8978/}
      # Jeton des liens d'action Discord (vérifié par les workflows 03/05/06).
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      # Jeton de la mini-interface : les workflows 02/06 l'envoient au service agent.
      UI_TOKEN: ${UI_TOKEN:-}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      # --- Authentification basique de l'UI ---
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      # --- Variables métier exposées aux workflows via $env ---
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      NOTION_API_KEY: ${NOTION_API_KEY}
      NOTION_DB_OFFRES: ${NOTION_DB_OFFRES}
      NOTION_DB_ENTREPRISES: ${NOTION_DB_ENTREPRISES}
      FRANCE_TRAVAIL_CLIENT_ID: ${FRANCE_TRAVAIL_CLIENT_ID}
      FRANCE_TRAVAIL_CLIENT_SECRET: ${FRANCE_TRAVAIL_CLIENT_SECRET}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}
      JOBSPY_API_URL: ${JOBSPY_API_URL:-http://jobspy:8000}
      RENDER_API_URL: ${RENDER_API_URL:-http://render:8000}
      AGENT_API_URL: ${AGENT_API_URL:-http://agent-langgraph:8001}
      EMBEDDINGS_API_URL: ${EMBEDDINGS_API_URL:-http://embeddings:8002}
      WTTJ_RSS_URL: ${WTTJ_RSS_URL:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
      LBA_API_KEY: ${LBA_API_KEY:-}
      DISCORD_WEBHOOK_ALERTS: ${DISCORD_WEBHOOK_ALERTS:-${DISCORD_WEBHOOK_URL:-}}
      DISCORD_WEBHOOK_LOG: ${DISCORD_WEBHOOK_LOG:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      GOOGLE_DRIVE_FOLDER: ${GOOGLE_DRIVE_FOLDER:-Candidatures}
      # --- Permet de lire les variables d'env dans les expressions n8n ---
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # --- Autorise les nœuds Read/Write Files à lire le prompt, l'index CV et
      #     les PDF de sortie (sinon n8n restreint à /home/node/.n8n-files) ---
      N8N_RESTRICT_FILE_ACCESS_TO: /prompts;/cv;/output
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows
      - ./prompts:/prompts
      - ./cv:/cv:ro
      # Documents générés par le service de rendu, lus par le workflow 04.
      - ./output:/output
    depends_on:
      postgres:
        condition: service_healthy

  jobspy:
    build: ./services/jobspy
    container_name: job-hunter-jobspy
    restart: unless-stopped
    # Pas de port exposé vers l'hôte : seul n8n l'appelle, via http://jobspy:8000
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

  # Agent de candidature (LangGraph) : porte l'intelligence extraite du workflow 02
  # (scoring, accroche groundée, personnalisation CV). n8n l'appelle via
  # http://agent-langgraph:8001/agent/run. Sortie au format §6 (parité monolithe).
  agent-langgraph:
    build: ./services/agent-langgraph
    container_name: job-hunter-agent
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      # Contexte lu au démarrage (mêmes fichiers que le 02 lisait).
      PROMPT_PATH: /prompts/agent-system-prompt.md
      CV_INDEX_PATH: /cv/cv-index.json
      # Mini-interface (URL -> CV+lettre -> Discord) : rendu + livraison Discord.
      RENDER_API_URL: ${RENDER_API_URL:-http://render:8000}
      DISCORD_WEBHOOK_ALERTS: ${DISCORD_WEBHOOK_ALERTS:-${DISCORD_WEBHOOK_URL:-}}
      # Accès Postgres pour la page de tri des offres (/offers). Optionnel :
      # si la base n'est pas lancée (mode léger just ui), la page renvoie un 503.
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      # Historique optionnel vers Airtable (inactif si vide).
      AIRTABLE_TOKEN: ${AIRTABLE_TOKEN:-}
      AIRTABLE_BASE_ID: ${AIRTABLE_BASE_ID:-}
      AIRTABLE_TABLE: ${AIRTABLE_TABLE:-Candidatures}
      # Jeton d'accès opt-in de la mini-interface (requis avant d'ouvrir BIND_HOST).
      UI_TOKEN: ${UI_TOKEN:-}
    # Mini-interface publiée sur 127.0.0.1 par défaut (local only, sans auth).
    ports:
      - "${BIND_HOST:-127.0.0.1}:${UI_PORT:-8901}:8001"
    volumes:
      - ./prompts:/prompts:ro
      - ./cv:/cv:ro
      # PDF générés par le service render, lus par l'agent pour la livraison Discord.
      - ./output:/output:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

  # Embeddings (fastembed) : vectorise les offres pour la dédup SÉMANTIQUE. Le 01
  # poste le texte d'une offre -> vecteur stocké dans offers.embedding (pgvector).
  embeddings:
    build: ./services/embeddings
    container_name: job-hunter-embeddings
    restart: unless-stopped
    # Pas de port exposé vers l'hôte : seul n8n l'appelle, via http://embeddings:8002
    expose:
      - "8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

  render:
    build: ./cv
    container_name: job-hunter-render
    restart: unless-stopped
    # Rendu CV (Astro) + lettre en PDF. Lancé en serveur HTTP, pas en one-shot.
    command: ["node", "server.mjs"]
    environment:
      # Dossier des templates de lettres (corps figé) lus pour l'assemblage.
      LETTERS_DIR: /assets/letters
      # Style du CV rendu : "ats" (défaut, 1 colonne sans photo) ou "design".
      CV_STYLE: ${CV_STYLE:-ats}
    # Pas de port exposé vers l'hôte : seul n8n l'appelle, via http://render:8000
    expose:
      - "8000"
    volumes:
      # PDF écrits ici, partagés avec n8n (lecture par le workflow 04).
      - ./output:/output
      # Templates de lettres (corps figé validé) en lecture seule.
      - ./assets:/assets:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  # Purge automatique des candidatures locales (./output) au-delà de la rétention.
  # Les PDF durables sont archivés sur Google Drive par le workflow 04 ; ./output
  # n'est qu'un dossier de travail -> on le borne. Tourne 1x/jour, gère les
  # fichiers root (écrits par le service render).
  cleanup:
    image: alpine:3.20
    container_name: job-hunter-cleanup
    restart: unless-stopped
    environment:
      OUTPUT_RETENTION_DAYS: ${OUTPUT_RETENTION_DAYS:-21}
    volumes:
      - ./output:/output
    command:
      - sh
      - -c
      - |
        echo "[cleanup] rétention = ${OUTPUT_RETENTION_DAYS:-21} jours";
        while true; do
          find /output -mindepth 1 -maxdepth 1 -type d -mtime +${OUTPUT_RETENTION_DAYS:-21} -exec rm -rf {} + 2>/dev/null || true;
          sleep 86400;
        done

  # Metabase : dashboards / exploration de la base (offres, entreprises, suivi).
  # Opt-in via le profil "metabase" : NE démarre PAS avec `docker compose up`.
  #   Lancer :  just metabase   (ou docker compose --profile metabase up -d metabase)
  # Lourd (~1 Go RAM, JVM) : à réserver aux moments où tu veux des stats.
  metabase:
    image: metabase/metabase:latest
    container_name: job-hunter-metabase
    profiles: ["metabase"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Données applicatives de Metabase stockées dans le Postgres du projet
      # (base dédiée "metabase", créée par db/init-metabase.sh au 1er init).
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: "5432"
      MB_DB_DBNAME: ${METABASE_DB:-metabase}
      MB_DB_USER: ${POSTGRES_USER:-n8n}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${METABASE_PORT:-8930}:3000"

volumes:
  postgres_data:
  n8n_data:
