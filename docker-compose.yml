services:
  postgres:
    image: postgres:16-alpine
    container_name: job-hunter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schéma métier appliqué au premier init (base vide uniquement).
      # Si la base existe déjà, appliquer db/schema.sql à la main (voir db/schema.sql).
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: job-hunter-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # --- Base de données ---
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      # --- Sécurité / accès ---
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      # --- Authentification basique de l'UI ---
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      # --- Variables métier exposées aux workflows via $env ---
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      NOTION_API_KEY: ${NOTION_API_KEY}
      NOTION_DB_OFFRES: ${NOTION_DB_OFFRES}
      NOTION_DB_ENTREPRISES: ${NOTION_DB_ENTREPRISES}
      FRANCE_TRAVAIL_CLIENT_ID: ${FRANCE_TRAVAIL_CLIENT_ID}
      FRANCE_TRAVAIL_CLIENT_SECRET: ${FRANCE_TRAVAIL_CLIENT_SECRET}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}
      JOBSPY_API_URL: ${JOBSPY_API_URL:-http://jobspy:8000}
      WTTJ_RSS_URL: ${WTTJ_RSS_URL:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      # --- Permet de lire les variables d'env dans les expressions n8n ---
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows
      - ./prompts:/prompts
    depends_on:
      postgres:
        condition: service_healthy

  jobspy:
    build: ./services/jobspy
    container_name: job-hunter-jobspy
    restart: unless-stopped
    # Pas de port exposé vers l'hôte : seul n8n l'appelle, via http://jobspy:8000
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  n8n_data:
